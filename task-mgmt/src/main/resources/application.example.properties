# Copy this file to application.properties for local development.

spring.application.name=task-mgmt

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/task-mgmt}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

server.port=8003
spring.main.allow-bean-definition-overriding=true

file.upload.public-key=${IMAGEKIT_PUBLIC_KEY:replace-me}
file.upload.private-key=${IMAGEKIT_PRIVATE_KEY:replace-me}
file.upload.url=${IMAGEKIT_URL:https://ik.imagekit.io/replace-me}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.default.member.password=${DEFAULT_MEMBER_PASSWORD:Task@1234}

logging.file.name=logs/task-mgmt.log

springdoc.swagger-ui.path=/swagger-ui.html

keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:task-mgmt}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:task-mgmt-client}
keycloak.client-id-admin=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8081/realms/task-mgmt/protocol/openid-connect/token}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:task-mgmt-secret-key}
keycloak.userinfo-uri=${KEYCLOAK_USERINFO_URI:http://localhost:8081/realms/task-mgmt/protocol/openid-connect/token/introspect}
